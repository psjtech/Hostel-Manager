<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hostel Management System — Shoolini University GHS Hostels. Manage rooms, students, allocations, fees and complaints." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Hostel Manager — Shoolini GHS</title>
  </head>
  <body>
    <div id="root">Loading Hostel Manager...</div>
    <script type="module">
      const root = document.getElementById('root');

      if (window.location.protocol === 'file:') {
        root.innerHTML = `
          <div style="max-width:720px;margin:48px auto;padding:24px;border:1px solid #d1d5db;border-radius:12px;font-family:Inter, sans-serif;line-height:1.6;color:#0f172a;background:#f8fafc;">
            <h1 style="margin:0 0 12px 0;font-size:24px;">Hostel Manager Frontend</h1>
            <p style="margin:0 0 10px 0;">This app uses Vite and React, so opening index.html directly will show a blank page.</p>
            <p style="margin:0 0 10px 0;">Run these commands in terminal:</p>
            <pre style="margin:0;padding:12px;border-radius:8px;background:#111827;color:#f9fafb;overflow:auto;">cd frontend
npm install
npm run dev</pre>
            <p style="margin:10px 0 0 0;">Then open the local URL shown by Vite (usually http://localhost:5173).</p>
          </div>
        `;
      } else {
        import('/src/main.jsx');
      }
    </script>
  </body>
</html>
